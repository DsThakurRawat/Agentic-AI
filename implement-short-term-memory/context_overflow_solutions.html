<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STM Solutions | Agentic AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --secondary: #a855f7;
            --accent: #f59e0b;
            --bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text: #f8fafc;
            --danger: #ef4444;
            --success: #22c55e;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            overflow-x: hidden;
            padding: 2rem;
        }

        .container { max-width: 1200px; margin: 0 auto; }

        header { text-align: center; margin-bottom: 3rem; }

        h1 {
            font-size: 3rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .solution-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            padding: 2.5rem;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .mode-selector {
            display: flex;
            background: #020617;
            padding: 0.5rem;
            border-radius: 15px;
            gap: 0.5rem;
        }

        .mode-btn {
            flex: 1;
            padding: 0.8rem;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            background: transparent;
            color: #94a3b8;
            font-weight: 600;
            transition: all 0.3s;
        }

        .mode-btn.active {
            background: var(--primary);
            color: white;
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.4);
        }

        .visual-bucket {
            background: #020617;
            border-radius: 20px;
            height: 400px;
            border: 2px solid #334155;
            position: relative;
            padding: 1.5rem;
            display: flex;
            flex-direction: column-reverse;
            gap: 10px;
            overflow: hidden;
        }

        .token-line {
            position: absolute;
            top: 20%;
            left: 0;
            width: 100%;
            border-top: 2px dashed var(--danger);
            z-index: 5;
            opacity: 0.5;
        }

        .token-line::after {
            content: "CRITICAL OVERFLOW LIMIT";
            position: absolute;
            right: 10px;
            top: -20px;
            font-size: 0.6rem;
            color: var(--danger);
            font-family: 'JetBrains Mono', monospace;
        }

        .msg {
            width: 100%;
            padding: 1rem;
            border-radius: 12px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.8rem;
            animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .msg-standard { background: linear-gradient(90deg, #334155, #1e293b); border: 1px solid #475569; }
        .msg-summary { background: linear-gradient(90deg, #92400e, #d97706); border: 1px solid var(--accent); color: white; }
        .msg-danger { background: var(--danger); color: white; }

        @keyframes popIn {
            from { transform: scale(0.8) translateY(20px); opacity: 0; }
            to { transform: scale(1) translateY(0); opacity: 1; }
        }

        .controls { display: flex; gap: 1rem; }

        button.action {
            flex: 1;
            padding: 1rem;
            border-radius: 15px;
            border: none;
            background: var(--primary);
            color: white;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
        }

        button.action:hover { transform: translateY(-2px); filter: brightness(1.2); }

        .desc-box h3 { color: var(--primary); margin-bottom: 0.5rem; }
        .desc-box p { color: #94a3b8; font-size: 0.95rem; }
        
        .status-badge {
            padding: 0.3rem 0.8rem;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 800;
            text-transform: uppercase;
        }
        .status-safe { background: rgba(34, 197, 94, 0.2); color: var(--success); }
        .status-danger { background: rgba(239, 68, 68, 0.2); color: var(--danger); }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>STM Solutions Simulator</h1>
            <p>Visualizing <strong>Filter</strong> vs <strong>Summarize</strong> strategies</p>
        </header>

        <div class="solution-grid">
            <div class="card">
                <div class="mode-selector">
                    <button class="mode-btn active" onclick="setMode('naive')">Naive</button>
                    <button class="mode-btn" onclick="setMode('filter')">Filter (Trim)</button>
                    <button class="mode-btn" onclick="setMode('summarize')">Summarize</button>
                </div>

                <div class="desc-box">
                    <h3 id="mode-title">Naive Mode (No Solution)</h3>
                    <p id="mode-desc">Every message is kept. This will eventually hit the context limit and crash your Agent.</p>
                </div>

                <div class="controls">
                    <button class="action" onclick="addMessage()">Add Message (+500 Tokens)</button>
                    <button class="action" style="background:#334155" onclick="reset()">Clear</button>
                </div>

                <div style="display:flex; justify-content: space-between; align-items: center;">
                    <span>Bucket Status:</span>
                    <span id="status" class="status-badge status-safe">Safe</span>
                </div>
            </div>

            <div class="card" style="padding: 1rem;">
                <div class="visual-bucket" id="bucket">
                    <div class="token-line"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let mode = 'naive';
        let messages = [];
        let tokenCount = 0;
        const bucket = document.getElementById('bucket');
        const status = document.getElementById('status');
        const modeTitle = document.getElementById('mode-title');
        const modeDesc = document.getElementById('mode-desc');

        const config = {
            naive: { title: "Naive Mode", desc: "No memory management. Context grows until it crashes." },
            filter: { title: "Filter (Trimming)", desc: "Oldest messages are deleted automatically to stay below the limit." },
            summarize: { title: "Summarization", desc: "Old messages are condensed into a single 'Summary' block to save space." }
        };

        function setMode(m) {
            mode = m;
            document.querySelectorAll('.mode-btn').forEach(btn => {
                btn.classList.toggle('active', btn.innerText.toLowerCase().includes(m));
            });
            modeTitle.innerText = config[m].title;
            modeDesc.innerText = config[m].desc;
            reset();
        }

        function addMessage() {
            // Solution Logic
            if (mode === 'filter' && messages.length >= 4) {
                messages.shift(); // Remove oldest
                render();
            }

            if (mode === 'summarize' && messages.length >= 4) {
                // Collapse into summary
                messages = [{ type: 'summary', text: 'COLLAPSED SUMMARY OF 4 MSGS' }];
                render();
            }

            messages.push({ type: 'standard', text: `MSG #${messages.length + 1} (500T)` });
            
            if (messages.length > 5) {
                messages[messages.length-1].type = 'danger';
            }
            
            render();
        }

        function render() {
            bucket.innerHTML = '<div class="token-line"></div>';
            messages.forEach(m => {
                const el = document.createElement('div');
                el.className = `msg msg-${m.type}`;
                el.innerHTML = `<span>${m.text}</span> <small>${m.type === 'summary' ? '★' : ''}</small>`;
                bucket.appendChild(el);
            });

            if (messages.length > 5) {
                status.innerText = "OVERFLOW";
                status.className = "status-badge status-danger";
            } else {
                status.innerText = "SAFE";
                status.className = "status-badge status-safe";
            }
        }

        function reset() {
            messages = [];
            render();
        }
    </script>
</body>
</html>
